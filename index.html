<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C172 Traffic Pattern Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Cessna 172 · Traffic Pattern Trainer</h1>
    <div class="controls">
      <span id="progressText" class="progress"></span>
      <button id="startBtn" class="btn primary">Start</button>
      <button id="restartBtn" class="btn" hidden>Restart</button>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT: cockpit panel (relative — value popover anchors to controls here) -->
    <section class="cockpit-wrap">
      <div id="cockpit" class="cockpit"></div>
      <div id="valuePopover" class="popover" hidden>
        <div id="popTitle" class="pop-title"></div>
        <div id="popOptions" class="pop-options"></div>
      </div>
    </section>

    <!-- RIGHT: conditions + minimap -->
    <aside class="side">
      <div id="phaseBanner" class="phase-banner">READY</div>

      <div class="action-card">
        <p class="conditions-label">CONDITIONS</p>
        <p id="conditions" class="conditions"></p>
        <p id="prompt" class="prompt"></p>
        <div id="feedback" class="feedback" hidden></div>

        <div class="card-actions">
          <button id="hintBtn" class="btn hint" hidden>Show hint</button>
          <button id="goaroundBtn" class="btn danger" hidden>⤴ Go Around</button>
        </div>
        <div id="goaroundHint" class="goaround-hint" hidden>
          <strong>Go around if:</strong> not stabilized (speed · glidepath · centerline) ·
          runway not clear · too high or too fast · balloon or bounce in the flare.
        </div>
        <div id="hintBox" class="hint-box" hidden></div>
      </div>

      <div class="minimap-box">
        <div id="minimap" class="minimap-holder"></div>
      </div>
    </aside>
  </main>

  <script src="js/sequence.js"></script>
  <script src="js/cockpit.js"></script>
  <script src="js/minimap.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
